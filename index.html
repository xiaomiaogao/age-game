<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇小游戏</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111827;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #fff;
    }

    .game-box {
      text-align: center;
      background: #1f2937;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    .info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0;
      font-size: 18px;
    }

    canvas {
      background: #0f172a;
      border: 3px solid #22c55e;
      border-radius: 8px;
      display: block;
    }

    button {
      margin-top: 16px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: #052e16;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .tips {
      margin-top: 12px;
      font-size: 14px;
      color: #d1d5db;
    }

    .mobile-controls {
      margin-top: 14px;
      display: none;
      grid-template-columns: repeat(3, 56px);
      gap: 8px;
      justify-content: center;
    }

    .mobile-controls button {
      margin: 0;
      width: 56px;
      height: 44px;
      padding: 0;
      font-size: 20px;
    }

    @media (max-width: 600px) {
      .game-box {
        width: 95vw;
        padding: 16px;
      }

      canvas {
        width: 300px;
        height: 300px;
        margin: 0 auto;
      }

      .mobile-controls {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div class="game-box">
    <h1>贪吃蛇小游戏</h1>

    <div class="info">
      <span>分数：<strong id="score">0</strong></span>
      <span id="status">进行中</span>
    </div>

    <canvas id="game" width="400" height="400"></canvas>

    <button onclick="restartGame()">重新开始</button>

    <div class="mobile-controls">
      <div></div>
      <button onclick="changeDirection('up')">↑</button>
      <div></div>
      <button onclick="changeDirection('left')">←</button>
      <button onclick="changeDirection('down')">↓</button>
      <button onclick="changeDirection('right')">→</button>
    </div>

    <div class="tips">电脑使用方向键控制；手机可以点击方向按钮。</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const statusEl = document.getElementById("status");

    const box = 20;
    const totalBox = canvas.width / box;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let gameTimer;
    let isGameOver;

    function initGame() {
      snake = [
        { x: 8, y: 10 },
        { x: 7, y: 10 },
        { x: 6, y: 10 }
      ];

      direction = "right";
      nextDirection = "right";
      score = 0;
      isGameOver = false;

      scoreEl.innerText = score;
      statusEl.innerText = "进行中";
      createFood();

      clearInterval(gameTimer);
      gameTimer = setInterval(drawGame, 130);
    }

    function createFood() {
      food = {
        x: Math.floor(Math.random() * totalBox),
        y: Math.floor(Math.random() * totalBox)
      };

      for (let part of snake) {
        if (part.x === food.x && part.y === food.y) {
          createFood();
          return;
        }
      }
    }

    function drawGame() {
      direction = nextDirection;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawFood();
      drawSnake();
      moveSnake();
    }

    function drawSnake() {
      for (let i = 0; i < snake.length; i++) {
        const part = snake[i];
        ctx.fillStyle = i === 0 ? "#22c55e" : "#86efac";
        ctx.fillRect(part.x * box, part.y * box, box - 2, box - 2);
      }
    }

    function drawFood() {
      ctx.fillStyle = "#ef4444";
      ctx.beginPath();
      ctx.arc(food.x * box + box / 2, food.y * box + box / 2, box / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
    }

    function moveSnake() {
      const head = { ...snake[0] };

      if (direction === "right") head.x++;
      if (direction === "left") head.x--;
      if (direction === "up") head.y--;
      if (direction === "down") head.y++;

      if (checkCollision(head)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.innerText = score;
        createFood();
      } else {
        snake.pop();
      }
    }

    function checkCollision(head) {
      if (head.x < 0 || head.x >= totalBox || head.y < 0 || head.y >= totalBox) {
        return true;
      }

      for (let part of snake) {
        if (head.x === part.x && head.y === part.y) {
          return true;
        }
      }

      return false;
    }

    function gameOver() {
      isGameOver = true;
      clearInterval(gameTimer);
      statusEl.innerText = "游戏结束";

      ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.font = "32px Microsoft YaHei";
      ctx.textAlign = "center";
      ctx.fillText("游戏结束", canvas.width / 2, canvas.height / 2 - 10);

      ctx.font = "18px Microsoft YaHei";
      ctx.fillText("点击重新开始再来一局", canvas.width / 2, canvas.height / 2 + 28);
    }

    function restartGame() {
      initGame();
    }

    function changeDirection(newDirection) {
      if (isGameOver) return;

      if (newDirection === "left" && direction !== "right") {
        nextDirection = "left";
      } else if (newDirection === "right" && direction !== "left") {
        nextDirection = "right";
      } else if (newDirection === "up" && direction !== "down") {
        nextDirection = "up";
      } else if (newDirection === "down" && direction !== "up") {
        nextDirection = "down";
      }
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowLeft") changeDirection("left");
      if (event.key === "ArrowRight") changeDirection("right");
      if (event.key === "ArrowUp") changeDirection("up");
      if (event.key === "ArrowDown") changeDirection("down");
    });

    initGame();
  </script>
</body>
</html>
