<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>霓虹坦克大战 · 十关版</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(56,189,248,.25), transparent 32%),
        radial-gradient(circle at 80% 20%, rgba(250,204,21,.18), transparent 28%),
        linear-gradient(135deg, #020617, #0f172a 45%, #111827);
      color: #e5e7eb;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    .shell {
      width: 1050px;
      max-width: 96vw;
      padding: 18px;
      border-radius: 28px;
      background: rgba(15, 23, 42, .82);
      border: 1px solid rgba(148, 163, 184, .22);
      box-shadow: 0 30px 80px rgba(0,0,0,.62), inset 0 0 50px rgba(56,189,248,.04);
      backdrop-filter: blur(10px);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    .title h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 3px;
      color: #facc15;
      text-shadow: 0 0 22px rgba(250,204,21,.55);
    }

    .title p {
      margin: 6px 0 0;
      color: #94a3b8;
      font-size: 14px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      min-width: 430px;
    }

    .hud-card {
      padding: 10px 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(30,41,59,.95), rgba(15,23,42,.92));
      border: 1px solid rgba(148,163,184,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 10px 24px rgba(0,0,0,.22);
    }

    .hud-card .name {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 2px;
    }

    .hud-card .num {
      font-size: 22px;
      font-weight: 900;
      color: #f8fafc;
    }

    .arena-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      border: 4px solid rgba(71,85,105,.95);
      box-shadow:
        0 22px 55px rgba(0,0,0,.48),
        0 0 0 1px rgba(255,255,255,.06),
        0 0 40px rgba(56,189,248,.08);
    }

    canvas {
      display: block;
      width: 100%;
      background: #020617;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(2,6,23,.76);
      backdrop-filter: blur(4px);
      text-align: center;
      padding: 20px;
    }

    .overlay.show { display: flex; }

    .modal {
      width: 520px;
      max-width: 92%;
      padding: 30px;
      border-radius: 30px;
      background:
        radial-gradient(circle at top, rgba(250,204,21,.18), transparent 34%),
        linear-gradient(145deg, #1e293b, #020617);
      border: 1px solid rgba(250,204,21,.42);
      box-shadow: 0 30px 90px rgba(0,0,0,.75), 0 0 50px rgba(250,204,21,.15);
    }

    .modal h2 {
      margin: 0 0 10px;
      font-size: 38px;
      color: #facc15;
      text-shadow: 0 0 20px rgba(250,204,21,.4);
    }

    .modal p {
      margin: 10px 0;
      color: #cbd5e1;
      line-height: 1.8;
      font-size: 15px;
    }

    .btn {
      margin-top: 16px;
      padding: 13px 28px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      background: linear-gradient(135deg, #fde047, #fb923c, #f97316);
      color: #431407;
      font-weight: 900;
      font-size: 16px;
      box-shadow: 0 14px 30px rgba(249,115,22,.32);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 12px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.7;
    }

    .kbd {
      display: inline-block;
      min-width: 26px;
      padding: 2px 7px;
      border-radius: 7px;
      background: #0f172a;
      border: 1px solid #475569;
      color: #f8fafc;
      text-align: center;
      font-weight: bold;
    }

    .mobile-controls {
      display: none;
      grid-template-columns: repeat(3, 62px);
      gap: 9px;
      justify-content: center;
      margin-top: 14px;
    }

    .mobile-controls button {
      width: 62px;
      height: 48px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: white;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 10px 24px rgba(37,99,235,.28);
    }

    .mobile-controls .fire {
      background: linear-gradient(135deg, #facc15, #f97316);
      color: #431407;
    }

    @media (max-width: 820px) {
      body { overflow: auto; align-items: flex-start; padding: 12px 0; }
      .header { flex-direction: column; align-items: stretch; }
      .title { text-align: center; }
      .title h1 { font-size: 26px; }
      .hud { min-width: auto; grid-template-columns: repeat(2, 1fr); }
      .footer { flex-direction: column; text-align: center; }
      .mobile-controls { display: grid; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div class="title">
        <h1>霓虹坦克大战</h1>
        <p>十关挑战 · 守护基地 · 击败所有敌军</p>
      </div>
      <div class="hud">
        <div class="hud-card"><div class="name">当前关卡</div><div class="num" id="levelText">1 / 10</div></div>
        <div class="hud-card"><div class="name">剩余生命</div><div class="num" id="lifeText">3</div></div>
        <div class="hud-card"><div class="name">敌军数量</div><div class="num" id="enemyText">0</div></div>
        <div class="hud-card"><div class="name">战斗分数</div><div class="num" id="scoreText">0</div></div>
      </div>
    </div>

    <div class="arena-wrap">
      <canvas id="game" width="960" height="630"></canvas>
      <div class="overlay show" id="overlay">
        <div class="modal">
          <h2 id="modalTitle">准备开战</h2>
          <p id="modalText">你是蓝色坦克。移动、射击、保护金色基地。清空敌人进入下一关，共 10 关。</p>
          <button class="btn" id="modalBtn" onclick="startGame()">开始游戏</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <div>电脑操作：<span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span> / 方向键移动，<span class="kbd">空格</span> 开炮。</div>
      <div>砖墙可被打碎，钢墙不可破坏；第 6 关后玩家炮弹威力增强。</div>
    </div>

    <div class="mobile-controls">
      <div></div>
      <button ontouchstart="mobileKey('up',true)" ontouchend="mobileKey('up',false)">↑</button>
      <div></div>
      <button ontouchstart="mobileKey('left',true)" ontouchend="mobileKey('left',false)">←</button>
      <button class="fire" onclick="shoot(player)">炮</button>
      <button ontouchstart="mobileKey('right',true)" ontouchend="mobileKey('right',false)">→</button>
      <div></div>
      <button ontouchstart="mobileKey('down',true)" ontouchend="mobileKey('down',false)">↓</button>
      <div></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const levelText = document.getElementById('levelText');
    const lifeText = document.getElementById('lifeText');
    const enemyText = document.getElementById('enemyText');
    const scoreText = document.getElementById('scoreText');
    const overlay = document.getElementById('overlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const modalBtn = document.getElementById('modalBtn');

    const TILE = 30;
    const ROWS = canvas.height / TILE;
    const COLS = canvas.width / TILE;
    const DIRS = {
      up: {x:0, y:-1},
      down: {x:0, y:1},
      left: {x:-1, y:0},
      right: {x:1, y:0}
    };

    const keys = {};
    const mobile = { up:false, down:false, left:false, right:false };
    let player, enemies, bullets, particles, map;
    let level = 1;
    let score = 0;
    let lives = 3;
    let running = false;
    let lastTime = 0;

    document.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      keys[key] = true;
      if (e.code === 'Space') {
        e.preventDefault();
        shoot(player);
      }
    });

    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    function mobileKey(dir, value) {
      mobile[dir] = value;
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function startGame() {
      level = 1;
      score = 0;
      lives = 3;
      running = true;
      overlay.classList.remove('show');
      loadLevel();
    }

    function loadLevel() {
      bullets = [];
      particles = [];
      map = createMap(level);
      player = createTank(2 * TILE, 19 * TILE, 'player');
      enemies = [];

      const enemyCount = Math.min(4 + level, 15);
      const points = [
        {x:2*TILE, y:1*TILE}, {x:15*TILE, y:1*TILE}, {x:29*TILE, y:1*TILE},
        {x:7*TILE, y:4*TILE}, {x:23*TILE, y:4*TILE}
      ];

      for (let i = 0; i < enemyCount; i++) {
        const p = points[i % points.length];
        const enemy = createTank(p.x + rand(-8, 8), p.y + rand(-4, 4), 'enemy');
        enemy.speed += level * 0.055;
        enemy.shootDelay = Math.max(44, 116 - level * 7 + rand(-15, 18));
        enemy.hp = level >= 7 && Math.random() < .3 ? 2 : 1;
        enemies.push(enemy);
      }
      updateHud();
    }

    function createTank(x, y, type) {
      return {
        x, y,
        w: 28, h: 28,
        type,
        dir: type === 'player' ? 'up' : 'down',
        speed: type === 'player' ? 2.65 : 1.38,
        cooldown: 0,
        aiTimer: rand(30, 95),
        shootDelay: rand(75, 135),
        hp: 1
      };
    }

    function createMap(lv) {
      const m = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

      for (let x = 0; x < COLS; x++) {
        m[0][x] = 2;
        m[ROWS - 1][x] = 2;
      }
      for (let y = 0; y < ROWS; y++) {
        m[y][0] = 2;
        m[y][COLS - 1] = 2;
      }

      const layouts = [
        [[5,5,5,1],[22,5,5,1],[9,10,4,1],[19,10,4,1],[14,15,4,1]],
        [[4,4,1,9],[27,4,1,9],[10,7,9,1],[10,14,9,1],[15,10,2,2]],
        [[6,3,2,6],[24,3,2,6],[4,13,7,1],[21,13,7,1],[12,8,8,1],[12,16,8,1]],
        [[3,5,9,1],[20,5,9,1],[8,9,1,7],[23,9,1,7],[13,13,6,1]],
        [[5,4,1,11],[26,4,1,11],[10,6,5,1],[18,6,5,1],[10,15,5,1],[18,15,5,1]],
        [[4,3,7,1],[21,3,7,1],[4,8,7,1],[21,8,7,1],[4,14,7,1],[21,14,7,1],[15,5,2,9]],
        [[7,4,1,5],[13,4,1,5],[19,4,1,5],[25,4,1,5],[7,14,1,4],[13,14,1,4],[19,14,1,4],[25,14,1,4]],
        [[3,3,1,15],[28,3,1,15],[8,5,5,1],[19,5,5,1],[8,12,5,1],[19,12,5,1],[13,9,7,1]],
        [[5,3,5,1],[22,3,5,1],[5,17,5,1],[22,17,5,1],[11,6,1,9],[21,6,1,9],[15,4,2,13]],
        [[3,4,11,1],[18,4,11,1],[3,9,11,1],[18,9,11,1],[3,15,11,1],[18,15,11,1],[15,6,2,9]]
      ];

      for (const block of layouts[lv - 1]) {
        fillTiles(m, block[0], block[1], block[2], block[3], 1);
      }

      const steelCount = Math.min(5 + lv, 14);
      for (let i = 0; i < steelCount; i++) {
        const x = rand(4, COLS - 5);
        const y = rand(3, ROWS - 6);
        if (!(x < 5 && y > 16) && !(x > 26 && y < 5)) m[y][x] = 2;
      }

      protectBase(m);
      return m;
    }

    function fillTiles(m, sx, sy, w, h, value) {
      for (let y = sy; y < sy + h; y++) {
        for (let x = sx; x < sx + w; x++) {
          if (y > 0 && y < ROWS - 1 && x > 0 && x < COLS - 1) m[y][x] = value;
        }
      }
    }

    function protectBase(m) {
      const bx = Math.floor(COLS / 2);
      const by = ROWS - 2;
      m[by][bx] = 3;
      m[by][bx - 1] = 1;
      m[by][bx + 1] = 1;
      m[by - 1][bx - 1] = 1;
      m[by - 1][bx] = 0;
      m[by - 1][bx + 1] = 1;
    }

    function updateHud() {
      levelText.textContent = level + ' / 10';
      lifeText.textContent = lives;
      enemyText.textContent = enemies ? enemies.filter(e => e.hp > 0).length : 0;
      scoreText.textContent = score;
    }

    function update() {
      if (!running) return;
      controlPlayer();
      updateEnemies();
      updateBullets();
      updateParticles();
      updateHud();

      if (enemies.every(e => e.hp <= 0)) {
        if (level >= 10) showWin();
        else showNextLevel();
      }
    }

    function controlPlayer() {
      if (!player || player.hp <= 0) return;
      if (player.cooldown > 0) player.cooldown--;

      let dir = null;
      if (keys['w'] || keys['arrowup'] || mobile.up) dir = 'up';
      if (keys['s'] || keys['arrowdown'] || mobile.down) dir = 'down';
      if (keys['a'] || keys['arrowleft'] || mobile.left) dir = 'left';
      if (keys['d'] || keys['arrowright'] || mobile.right) dir = 'right';
      if (dir) moveTank(player, dir);
    }

    function updateEnemies() {
      for (const e of enemies) {
        if (e.hp <= 0) continue;
        if (e.cooldown > 0) e.cooldown--;
        e.aiTimer--;
        e.shootDelay--;

        if (e.aiTimer <= 0) {
          if (Math.random() < .42) e.dir = chaseDirection(e, player);
          else e.dir = ['up','down','left','right'][rand(0,3)];
          e.aiTimer = rand(28, 86);
        }

        moveTank(e, e.dir);
        if (e.shootDelay <= 0) {
          shoot(e);
          e.shootDelay = rand(68, Math.max(72, 142 - level * 5));
        }
      }
    }

    function chaseDirection(a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? 'right' : 'left';
      return dy > 0 ? 'down' : 'up';
    }

    function moveTank(t, dir) {
      t.dir = dir;
      const d = DIRS[dir];
      const nx = t.x + d.x * t.speed;
      const ny = t.y + d.y * t.speed;
      if (!isBlocked(nx, ny, t.w, t.h, t)) {
        t.x = nx;
        t.y = ny;
      } else if (t.type === 'enemy') {
        t.aiTimer = 0;
      }
    }

    function isBlocked(x, y, w, h, self) {
      if (x < 0 || y < 0 || x + w > canvas.width || y + h > canvas.height) return true;

      const points = [[x,y],[x+w,y],[x,y+h],[x+w,y+h]];
      for (const [px, py] of points) {
        const tx = Math.floor(px / TILE);
        const ty = Math.floor(py / TILE);
        if (map[ty] && map[ty][tx]) return true;
      }

      const list = self.type === 'player' ? enemies : [player, ...enemies];
      for (const o of list) {
        if (!o || o === self || o.hp <= 0) continue;
        if (rectHit({x,y,w,h}, o)) return true;
      }
      return false;
    }

    function shoot(t) {
      if (!running || !t || t.hp <= 0 || t.cooldown > 0) return;
      const d = DIRS[t.dir];
      bullets.push({
        x: t.x + t.w / 2 + d.x * 18,
        y: t.y + t.h / 2 + d.y * 18,
        dx: d.x,
        dy: d.y,
        owner: t.type,
        speed: t.type === 'player' ? 6.5 : 4.9,
        power: t.type === 'player' && level >= 6 ? 2 : 1
      });
      t.cooldown = t.type === 'player' ? 20 : 44;
      makeParticles(t.x + 14 + d.x * 18, t.y + 14 + d.y * 18, '#fde68a', 6);
    }

    function updateBullets() {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.dx * b.speed;
        b.y += b.dy * b.speed;

        if (b.x < 0 || b.y < 0 || b.x > canvas.width || b.y > canvas.height) {
          bullets.splice(i, 1);
          continue;
        }

        const tx = Math.floor(b.x / TILE);
        const ty = Math.floor(b.y / TILE);
        const tile = map[ty] && map[ty][tx];
        if (tile === 1 || tile === 2 || tile === 3) {
          if (tile === 1) map[ty][tx] = 0;
          if (tile === 3 && b.owner === 'enemy') loseLife();
          makeParticles(b.x, b.y, tile === 2 ? '#cbd5e1' : '#fb923c', 15);
          bullets.splice(i, 1);
          continue;
        }

        if (b.owner === 'player') {
          for (const e of enemies) {
            if (e.hp > 0 && pointInRect(b.x, b.y, e)) {
              e.hp -= b.power;
              makeParticles(e.x + 14, e.y + 14, '#fb7185', 25);
              bullets.splice(i, 1);
              if (e.hp <= 0) score += 100;
              break;
            }
          }
        } else {
          if (player.hp > 0 && pointInRect(b.x, b.y, player)) {
            makeParticles(player.x + 14, player.y + 14, '#38bdf8', 25);
            bullets.splice(i, 1);
            loseLife();
          }
        }
      }
    }

    function loseLife() {
      lives--;
      if (lives <= 0) {
        showLose();
        return;
      }
      player.x = 2 * TILE;
      player.y = 19 * TILE;
      player.dir = 'up';
      bullets = [];
      updateHud();
    }

    function pointInRect(x, y, r) {
      return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
    }

    function rectHit(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function makeParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - .5) * 5,
          vy: (Math.random() - .5) * 5,
          life: rand(16, 34),
          size: rand(2, 5),
          color
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function showNextLevel() {
      running = false;
      level++;
      modalTitle.textContent = '第 ' + level + ' 关';
      modalText.textContent = '敌军数量增加，移动和开火速度提升。继续守住基地！';
      modalBtn.textContent = '继续挑战';
      modalBtn.onclick = () => {
        overlay.classList.remove('show');
        running = true;
        loadLevel();
      };
      overlay.classList.add('show');
    }

    function showLose() {
      running = false;
      modalTitle.textContent = '任务失败';
      modalText.textContent = '你的坦克或基地被摧毁了。最终分数：' + score;
      modalBtn.textContent = '重新开始';
      modalBtn.onclick = startGame;
      overlay.classList.add('show');
    }

    function showWin() {
      running = false;
      modalTitle.textContent = '十关通关！';
      modalText.textContent = '漂亮！你完成了全部 10 关。最终分数：' + score;
      modalBtn.textContent = '再玩一次';
      modalBtn.onclick = startGame;
      overlay.classList.add('show');
    }

    function draw() {
      drawGround();
      drawMap();
      drawBase();
      drawTank(player);
      enemies.forEach(drawTank);
      drawBullets();
      drawParticles();
    }

    function drawGround() {
      const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      g.addColorStop(0, '#06111f');
      g.addColorStop(.5, '#0f172a');
      g.addColorStop(1, '#111827');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = 'rgba(148,163,184,.08)';
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.width; x += TILE) {
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += TILE) {
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
      }

      ctx.fillStyle = 'rgba(56,189,248,.04)';
      ctx.beginPath();
      ctx.arc(120, 120, 160, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawMap() {
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const tile = map[y][x];
          if (!tile) continue;
          const px = x * TILE;
          const py = y * TILE;

          if (tile === 1) drawBrick(px, py);
          if (tile === 2) drawSteel(px, py);
        }
      }
    }

    function drawBrick(x, y) {
      const g = ctx.createLinearGradient(x, y, x + TILE, y + TILE);
      g.addColorStop(0, '#f59e0b');
      g.addColorStop(.5, '#b45309');
      g.addColorStop(1, '#7c2d12');
      ctx.fillStyle = g;
      ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
      ctx.fillStyle = 'rgba(255,255,255,.18)';
      ctx.fillRect(x + 4, y + 6, TILE - 8, 3);
      ctx.fillRect(x + 4, y + 18, TILE - 8, 3);
    }

    function drawSteel(x, y) {
      const g = ctx.createLinearGradient(x, y, x + TILE, y + TILE);
      g.addColorStop(0, '#e2e8f0');
      g.addColorStop(.45, '#64748b');
      g.addColorStop(1, '#1e293b');
      ctx.fillStyle = g;
      ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
      ctx.strokeStyle = 'rgba(15,23,42,.75)';
      ctx.strokeRect(x + 6, y + 6, TILE - 12, TILE - 12);
    }

    function drawBase() {
      const bx = Math.floor(COLS / 2) * TILE;
      const by = (ROWS - 2) * TILE;
      ctx.save();
      ctx.shadowColor = '#facc15';
      ctx.shadowBlur = 18;
      ctx.fillStyle = '#facc15';
      ctx.beginPath();
      ctx.moveTo(bx + 15, by + 3);
      ctx.lineTo(bx + 27, by + 25);
      ctx.lineTo(bx + 3, by + 25);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#7c2d12';
      ctx.fillRect(bx + 10, by + 15, 10, 12);
      ctx.restore();
    }

    function drawTank(t) {
      if (!t || t.hp <= 0) return;
      ctx.save();
      ctx.translate(t.x + t.w/2, t.y + t.h/2);
      const angle = { up:0, right:Math.PI/2, down:Math.PI, left:-Math.PI/2 }[t.dir];
      ctx.rotate(angle);

      const isPlayer = t.type === 'player';
      const main = isPlayer ? '#38bdf8' : '#ef4444';
      const dark = isPlayer ? '#075985' : '#991b1b';
      ctx.shadowColor = isPlayer ? '#38bdf8' : '#ef4444';
      ctx.shadowBlur = 10;

      ctx.fillStyle = '#020617';
      ctx.fillRect(-17, -16, 8, 32);
      ctx.fillRect(9, -16, 8, 32);

      const g = ctx.createLinearGradient(-14, -14, 14, 14);
      g.addColorStop(0, main);
      g.addColorStop(1, dark);
      ctx.fillStyle = g;
      ctx.fillRect(-12, -13, 24, 26);

      ctx.fillStyle = '#e5e7eb';
      ctx.fillRect(-3, -27, 6, 22);
      ctx.fillStyle = isPlayer ? '#facc15' : '#fecaca';
      ctx.beginPath();
      ctx.arc(0, 0, 7, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function drawBullets() {
      for (const b of bullets) {
        ctx.save();
        ctx.shadowColor = b.owner === 'player' ? '#fde047' : '#fb7185';
        ctx.shadowBlur = 14;
        ctx.fillStyle = b.owner === 'player' ? '#fde047' : '#fb7185';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life / 34);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function loop(time) {
      if (time - lastTime > 16) {
        update();
        draw();
        lastTime = time;
      }
      requestAnimationFrame(loop);
    }

    drawGround();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
