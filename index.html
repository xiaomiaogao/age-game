function makeId(){const d=new Date();const pad=n=>String(n).padStart(2,'0');const time=d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds());const rand=Math.random().toString(36).slice(2,8).toUpperCase();return 'CH-'+time+'-'+rand;}
function shuffle(arr){const a=[...arr];for(let j=a.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[a[j],a[k]]=[a[k],a[j]]}return a;}

function startGame(){const names=Object.keys(PAPERS);paperName=names[Math.floor(Math.random()*names.length)];qs=shuffle(PAPERS[paperName]).map(item=>{const opts=shuffle(item.options);return {...item,options:opts,correctIndex:opts.indexOf(item.a)}});i=0;score=0;rightCount=0;wrongCount=0;locked=false;scoreEl.innerText=0;wrongNumEl.innerText=0;startPanel.classList.add('hidden');victoryPanel.classList.add('hidden');playPanel.classList.remove('hidden');load();}
function getModuleName(index){return paperName+'：随机题库（'+((index%10)+1)+'/10）';}
function load(){locked=false;const item=qs[i];typeEl.innerText=item.t;questionEl.innerText=item.q;msgEl.innerText='请选择答案，答对 +1 分。';hintBox.classList.add('hidden');hintBox.innerHTML='';levelEl.innerText='第 '+(i+1)+' / '+qs.length+' 题';paperBadge.innerText='当前：'+paperName;moduleLine.innerText=getModuleName(i);progressEl.style.width=(i/qs.length*100)+'%';optionsEl.innerHTML='';const letters=['A','B','C','D'];item.options.forEach((op,idx)=>{const btn=document.createElement('button');btn.className='option';btn.innerHTML='<span class="letter">'+letters[idx]+'</span><span>'+op+'</span>';btn.onclick=()=>choose(idx);optionsEl.appendChild(btn);});questionAreaEl.style.animation='none';setTimeout(()=>questionAreaEl.style.animation='pop .28s ease',20);}
function showHint(){if(!qs[i])return;hintBox.classList.remove('hidden');hintBox.innerHTML='💡 提示：'+qs[i].hint;}
function choose(idx){if(locked)return;locked=true;[...optionsEl.children].forEach(b=>b.disabled=true);const item=qs[i];if(idx===item.correctIndex){score++;rightCount++;scoreEl.innerText=score;msgEl.innerHTML='✅ 答对了！+1 分';cardEl.classList.add('right-flash');setTimeout(()=>cardEl.classList.remove('right-flash'),450);setTimeout(nextQuestion,750);}else{wrongCount++;wrongNumEl.innerText=wrongCount;msgEl.innerHTML='❌ 答错了，正确答案：<b>'+item.a+'</b>';cardEl.classList.add('wrong-flash');shake();setTimeout(()=>cardEl.classList.remove('wrong-flash'),450);if(wrongCount>=10){setTimeout(()=>finish(false),900);}else{setTimeout(nextQuestion,900);}}}
function nextQuestion(){i++;if(i>=qs.length)finish(true);else load();}
function shake(){cardEl.classList.add('shake');setTimeout(()=>cardEl.classList.remove('shake'),300);}
function getLevel(score){if(score<60)return{name:'继续加油',desc:'这次只是热身，错题会帮你变强。'};if(score<75)return{name:'稳步进步',desc:'基础已经有了，再练一轮会更稳。'};if(score<90)return{name:'优秀选手',desc:'知识面很不错，离满分不远了。'};return{name:'王者段位',desc:'太强了，这套题基本被你打穿了。'};}
function finish(completed){progressEl.style.width=(completed?'100%':(i/qs.length*100))+'%';playPanel.classList.add('hidden');victoryPanel.classList.remove('hidden');const level=getLevel(score);if(completed){endIcon.innerText='🏆';endTitle.innerText='挑战完成！';finalText.innerHTML=`你的最终得分：<span class="gold" style="font-size:30px;">${score}</span> / 100<br>评级：<span class="gold">${level.name}</span><br>${level.desc}`;}else{endIcon.innerText='🌈';endTitle.innerText='别灰心，先休息一下！';finalText.innerHTML=`你已经完成了 <span class="gold">${i+1}</span> 题，当前得分：<span class="gold" style="font-size:30px;">${score}</span> / 100<br>错题达到 10 题，本局提前结束。<br><span class="gold">没关系，答题就是越练越熟，下次一定能超过这次！</span>`;}resultList.innerHTML=`<li>📄 试卷：<span class="gold">${paperName}</span></li><li>✅ 答对：<span class="gold">${rightCount}</span> 题</li><li>❌ 答错：<span class="gold">${wrongCount}</span> 题</li><li>📚 已答：<span class="gold">${completed?qs.length:i+1}</span> / 100 题</li><li>👤 用户：<span class="gold">${userId}</span></li>`;challengeIdBox.innerHTML='挑战ID：'+challengeId+'<br>用户：'+userId;}
function restartGame(){startGame();}
</script>
</body></html>
