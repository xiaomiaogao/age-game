14px;font-size:14px;flex-wrap:wrap}.badge,.score-box{padding:8px 12px;border-radius:999px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.16)}.score-box span,.gold{color:#ffef5a;font-weight:900;text-shadow:0 0 14px rgba(255,239,90,.5)}.question-area{min-height:178px;padding:22px 14px;border-radius:24px;background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.06));border:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;justify-content:center;animation:pop .28s ease}@keyframes pop{from{transform:scale(.96);opacity:.35}to{transform:scale(1);opacity:1}}#type{margin:0 0 14px;color:#00f5ff;font-weight:900;font-size:16px}#question{margin:0;font-size:25px;line-height:1.6;word-break:break-word}.options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}.option{background:rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.16);text-align:left;line-height:1.5}.option.correct{background:linear-gradient(135deg,#00c853,#00bfa5)}.option.wrong{background:linear-gradient(135deg,#ff1744,#ff6d00)}.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.hint-btn{background:linear-gradient(135deg,#7c4dff,#00b0ff)}.next-btn{background:linear-gradient(135deg,#ff0050,#ff7a00)}#msg,.hint-box{min-height:46px;margin-top:14px;padding:12px;border-radius:16px;line-height:1.6;background:rgba(0,0,0,.25)}.hint-box{color:#fff6b0;text-align:left}.progress-wrap{margin-top:16px;height:10px;border-radius:99px;overflow:hidden;background:rgba(255,255,255,.15)}#progress{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#00f5ff,#ff0050,#ffef5a);transition:width .25s ease}.end-box{position:relative;padding:26px 12px 46px}.victory-title{font-size:36px;margin:0 0 12px;text-shadow:0 0 20px rgba(255,239,90,.8),3px 3px 0 #ff0050,-3px -3px 0 #00f5ff}.result-list{text-align:left;margin:16px 0 0;padding:0;list-style:none}.result-list li{margin:8px 0;padding:10px 12px;border-radius:14px;background:rgba(0,0,0,.22);color:#e8e8ff}.paper-id{position:absolute;left:12px;bottom:10px;font-size:12px;color:#bfc0ff;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:6px 10px}.meta{font-size:12px;color:#bfc0ff;line-height:1.7}@media(max-width:520px){h1{font-size:28px}#question{font-size:21px}.module-grid,.options{grid-template-columns:1fr}}

<div class="app"><h1>📜 千字文千卷挑战</h1><p class="sub-title">1000 套随机试卷｜每卷 20 题｜满分 100｜90 分及格｜答错 5 题自动结束</p><div class="card" id="card">

<script>
const DATA = {"categories": [{"name": "天文宇宙", "items": [{"q": "太阳系中离太阳最近的行星是？", "answer": "水星", "wrong": ["金星", "地球", "火星"], "hint": "最近太阳的小行星，名字里有“水”。", "difficulty": "simple"}, {"q": "地球唯一的天然卫星是？", "answer": "月球", "wrong": ["火星", "太阳", "北极星"], "hint": "晚上常看到，也会有阴晴圆缺。", "difficulty": "simple"}, {"q": "白天看见的恒星通常是哪一颗？", "answer": "太阳", "wrong": ["月球", "金星", "木星"], "hint": "它给地球带来光和热。", "difficulty": "simple"}, {"q": "一年四季变化主要和地球哪种运动有关？", "answer": "公转", "wrong": ["自转", "潮汐", "降雨"], "hint": "地球绕太阳转一圈约一年。", "difficulty": "medium"}, {"q": "北极星大致指向哪个方向？", "answer": "北方", "wrong": ["南方", "东方", "西方"], "hint": "古人常用它辨认方向。", "difficulty": "simple"}, {"q": "银河系属于哪一类天体系统？", "answer": "星系", "wrong": ["行星", "彗星", "卫星"], "hint": "它由大量恒星、气体和尘埃组成。", "difficulty": "medium"}, {"q": "月食发生时，位于太阳和月球中间的是？", "answer": "地球", "wrong": ["火星", "金星", "木星"], "hint": "地球的影子落到月球上。", "difficulty": "medium"}, {"q": "哈雷彗星大约多少年回归一次？", "answer": "76年", "wrong": ["12年", "365天", "1000年"], "hint": "人一生可能见到一次左右。", "difficulty": "hard"}, {"q": "太阳表面常见的黑暗区域叫什么？", "answer": "太阳黑子", "wrong": ["月海", "陨石坑", "星云"], "hint": "名字里有“黑子”。", "difficulty": "medium"}, {"q": "光在真空中的速度约为每秒多少公里？", "answer": "30万公里", "wrong": ["300公里", "3万公里", "3000万公里"], "hint": "常说“光速约每秒三十万公里”。", "difficulty": "hard"}]}, {"name": "世界地理", "items": [{"q": "世界上面积最大的洲是？", "answer": "亚洲", "wrong": ["欧洲", "非洲", "南美洲"], "hint": "中国、日本、印度都在这个洲。", "difficulty": "simple"}, {"q": "世界上面积最大的洋是？", "answer": "太平洋", "wrong": ["大西洋", "印度洋", "北冰洋"], "hint": "名字里有“太平”。", "difficulty": "simple"}, {"q": "埃及金字塔主要位于哪条河附近？", "answer": "尼罗河", "wrong": ["亚马孙河", "长江", "多瑙河"], "hint": "古埃及文明依靠这条河。", "difficulty": "medium"}, {"q": "撒哈拉沙漠主要位于哪个洲？", "answer": "非洲", "wrong": ["亚洲", "欧洲", "大洋洲"], "hint": "它是世界著名大沙漠。", "difficulty": "simple"}, {"q": "珠穆朗玛峰位于哪条山脉？", "answer": "喜马拉雅山脉", "wrong": ["阿尔卑斯山脉", "安第斯山脉", "落基山脉"], "hint": "世界最高峰所在山脉。", "difficulty": "medium"}, {"q": "世界上最长的河流通常认为是？", "answer": "尼罗河", "wrong": ["黄河", "泰晤士河", "伏尔加河"], "hint": "流经非洲东北部。", "difficulty": "medium"}, {"q": "澳大利亚首都是？", "answer": "堪培拉", "wrong": ["悉尼", "墨尔本", "布里斯班"], "hint": "不是悉尼，也不是墨尔本。", "difficulty": "hard"}, {"q": "巴西首都是？", "answer": "巴西利亚", "wrong": ["里约热内卢", "圣保罗", "布宜诺斯艾利斯"], "hint": "名字和国家名很像。", "difficulty": "medium"}, {"q": "日本最高的山是？", "answer": "富士山", "wrong": ["阿苏山", "六甲山", "太行山"], "hint": "常见于日本明信片。", "difficulty": "simple"}, {"q": "地球上纬度为0度的线叫？", "answer": "赤道", "wrong": ["本初子午线", "北回归线", "南极圈"], "hint": "把地球分成南北半球。", "difficulty": "simple"}]}, {"name": "人类起源与历史", "items": [{"q": "现代人类属于哪一属？", "answer": "人属", "wrong": ["猫属", "马属", "熊属"], "hint": "名字很直接。", "difficulty": "medium"}, {"q": "人类文明早期常说的“两河流域”在今天大致属于哪里？", "answer": "西亚", "wrong": ["北欧", "南极", "澳洲"], "hint": "幼发拉底河和底格里斯河一带。", "difficulty": "medium"}, {"q": "中国传说中教人钻木取火的是？", "answer": "燧人氏", "wrong": ["神农氏", "伏羲氏", "仓颉"], "hint": "名字里有“燧”。", "difficulty": "medium"}, {"q": "古埃及文字常被称为？", "answer": "象形文字", "wrong": ["楔形文字", "甲骨文", "拉丁文"], "hint": "像图画一样的文字。", "difficulty": "simple"}, {"q": "中国目前发现较早的成熟文字之一是？", "answer": "甲骨文", "wrong": ["英文", "日文", "韩文"], "hint": "刻在龟甲兽骨上。", "difficulty": "simple"}, {"q": "丝绸之路主要连接中国和哪个方向的地区？", "answer": "西方", "wrong": ["南极", "月球", "深海"], "hint": "从长安向西延伸。", "difficulty": "simple"}, {"q": "古罗马常见的大型竞技建筑叫？", "answer": "斗兽场", "wrong": ["金字塔", "故宫", "天坛"], "hint": "角斗士表演常在这里。", "difficulty": "medium"}, {"q": "哥伦布远航常与发现哪片大陆联系在一起？", "answer": "美洲", "wrong": ["南极洲", "澳洲", "亚洲"], "hint": "后来被称为“新大陆”。", "difficulty": "medium"}, {"q": "工业革命最早兴起于哪个国家？", "answer": "英国", "wrong": ["巴西", "埃及", "泰国"], "hint": "蒸汽机和纺织业发展很早。", "difficulty": "hard"}, {"q": "秦朝统一文字后常用的标准字体是？", "answer": "小篆", "wrong": ["楷书", "草书", "英文"], "hint": "秦始皇时期推行。", "difficulty": "hard"}]}, {"name": "实时政治与国际组织", "items": [{"q": "联合国总部位于哪座城市？", "answer": "纽约", "wrong": ["巴黎", "东京", "罗马"], "hint": "在美国东海岸的大城市。", "difficulty": "simple"}, {"q": "联合国秘书长古特雷斯来自哪个国家？", "answer": "葡萄牙", "wrong": ["法国", "德国", "加拿大"], "hint": "他曾任这个欧洲国家总理。", "difficulty": "medium"}, {"q": "美国现任总统是？", "answer": "唐纳德·特朗普
