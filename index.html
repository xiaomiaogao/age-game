<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>100题终极挑战</title>
<style>
body{margin:0;font-family:微软雅黑;background:#0f1020;color:#fff;text-align:center}
.app{max-width:480px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,.1);padding:20px;border-radius:20px}
button{padding:10px;border:none;border-radius:10px;margin:5px;cursor:pointer}
input{padding:10px;border-radius:10px;border:none;width:80%}
</style>
</head>
<body>
<div class="app">
<h2>🔥 100题终极挑战</h2>
<div class="card">
<p id="type"></p>
<p id="question"></p>
<input id="answer" placeholder="输入答案">
<br>
<button onclick="check()">提交</button>
<p id="msg"></p>
<p>得分：<span id="score">0</span></p>
</div>
</div>
<script>
const qs=[

{t:"看图成语",q:"🐍➕🦶",a:["画蛇添足"]},
{t:"看图成语",q:"🐔➕🐶",a:["鸡犬不宁"]},
{t:"看图成语",q:"🐍➡️🐉",a:["画龙点睛"]},
{t:"看图成语",q:"🐟➕🐠",a:["如鱼得水"]},
{t:"看图成语",q:"👂➕🪨",a:["充耳不闻"]},

{t:"看图成语",q:"🐯➕👀",a:["虎视眈眈"]},

//11-20 诗句补词
{t:"诗句",q:"床前明月光，疑是地上___",a:["霜"]},
{t:"诗句",q:"白日依山尽，黄河入海___",a:["流"]},
{t:"诗句",q:"锄禾日当午，汗滴禾下___",a:["土"]},
{t:"诗句",q:"举头望明月，低头思___",a:["故乡"]},
{t:"诗句",q:"春眠不觉晓，处处闻啼___",a:["鸟"]},
{t:"诗句",q:"两岸猿声啼不住，轻舟已过万重___",a:["山"]},
{t:"诗句",q:"孤帆远影碧空尽，唯见长江天际___",a:["流"]},
{t:"诗句",q:"欲穷千里目，更上一层___",a:["楼"]},
{t:"诗句",q:"海内存知己，天涯若比___",a:["邻"]},
{t:"诗句",q:"会当凌绝顶，一览众山___",a:["小"]},

//21-30 四大名著人物
{t:"名著人物",q:"大闹天宫",a:["孙悟空"]},
{t:"名著人物",q:"倒拔垂杨柳",a:["鲁智深"]},
{t:"名著人物",q:"草船借箭",a:["诸葛亮"]},
{t:"名著人物",q:"林妹妹",a:["林黛玉"]},
{t:"名著人物",q:"行者",a:["孙悟空"]},
{t:"名著人物",q:"豹子头",a:["林冲"]},
{t:"名著人物",q:"黑旋风",a:["李逵"]},
{t:"名著人物",q:"贾宝玉丫鬟",a:["袭人"]},
{t:"名著人物",q:"武松打虎",a:["武松"]},

{t:"名著地点",q:"水浒聚义",a:["梁山"]},

{t:"名著地点",q:"赤壁之战",a:["赤壁"]},

//41-50 世界战役
{t:"世界战役",q:"滑铁卢战役",a:["滑铁卢"]},

{t:"世界战役",q:"凡尔登",a:["凡尔登"]},
{t:"世界战役",q:"滑铁卢人物",a:["拿破仑"]},
{t:"世界战役",q:"二战德国领袖",a:["希特勒"]},
{t:"世界战役",q:"美国将军",a:["麦克阿瑟"]},
{t:"世界战役",q:"罗马名将",a:["凯撒"]}
];
let i=0,score=0;
function load(){let q=qs[i];type.innerText=q.t;question.innerText=q.q;answer.value="";msg.innerText=""}
function check(){let val=answer.value;let ok=qs[i].a.includes(val);if(ok){score+=2;msg.innerText="✅对"}else{msg.innerText="❌错："+qs[i].a[0]}scoreEl.innerText=score;i++;if(i>=qs.length){finish()}else{load()}}
function finish(){document.body.innerHTML=`<h1>结束 得分:${score}</h1>`}
load();
</script>
</body>
</html>
