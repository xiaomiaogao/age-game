<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>100题终极挑战</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      color: #fff;
      text-align: center;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(255, 0, 100, .48), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0, 245, 255, .48), transparent 35%),
        linear-gradient(135deg, #101020, #181832 55%, #070713);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(540px, 94vw);
      margin: 0 auto;
      padding: 24px 0 42px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.15;
      text-shadow: 3px 3px 0 #ff0050, -3px -3px 0 #00f5ff;
      letter-spacing: 1px;
    }

    .sub-title {
      margin: 0 0 18px;
      color: #d8d8f0;
      font-size: 14px;
      line-height: 1.6;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .18);
      box-shadow: 0 24px 70px rgba(0, 0, 0, .42), inset 0 1px 0 rgba(255,255,255,.18);
      backdrop-filter: blur(16px);
      padding: 22px;
      border-radius: 28px;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      right: -80px;
      top: -80px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 0, 80, .3);
      filter: blur(8px);
      pointer-events: none;
    }

    .hidden { display: none !important; }

    .top-row {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      font-size: 14px;
    }

    .badge,
    .score-box {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .25);
      border: 1px solid rgba(255, 255, 255, .16);
    }

    .score-box span {
      color: #ffef5a;
      font-weight: 900;
      text-shadow: 0 0 14px rgba(255,239,90,.5);
    }

    .module-line {
      position: relative;
      z-index: 1;
      margin: 4px 0 14px;
      font-size: 13px;
      color: #bfc0ff;
    }

    .question-area {
      position: relative;
      z-index: 1;
      min-height: 190px;
      padding: 22px 14px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
      border: 1px solid rgba(255,255,255,.12);
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: pop .28s ease;
    }

    @keyframes pop {
      from { transform: scale(.96); opacity: .35; }
      to { transform: scale(1); opacity: 1; }
    }

    #type {
      margin: 0 0 14px;
      color: #00f5ff;
      font-weight: 900;
      font-size: 16px;
    }

    #question {
      margin: 0;
      font-size: 25px;
      line-height: 1.6;
      word-break: break-word;
    }

    input {
      position: relative;
      z-index: 1;
      width: 100%;
      margin-top: 18px;
      padding: 15px 16px;
      border-radius: 18px;
      border: none;
      outline: none;
      font-size: 17px;
      color: #17172a;
      background: rgba(255,255,255,.95);
    }

    input:focus { box-shadow: 0 0 0 3px rgba(0, 245, 255, .6); }

    .btn-row {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    button {
      border: none;
      cursor: pointer;
      padding: 14px 10px;
      border-radius: 18px;
      color: #fff;
      font-weight: 900;
      font-size: 16px;
      transition: transform .12s ease, filter .12s ease;
    }

    button:active { transform: scale(.96); }
    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: .55; cursor: not-allowed; }

    .submit {
      background: linear-gradient(135deg, #ff0050, #ff7a00);
      box-shadow: 0 10px 26px rgba(255, 0, 80, .35);
    }

    .skip {
      background: linear-gradient(135deg, #00c2ff, #6c5cff);
      box-shadow: 0 10px 26px rgba(0, 194, 255, .28);
    }

    .start-btn,
    .restart {
      width: 100%;
      margin-top: 16px;
      background: linear-gradient(135deg, #00f5ff, #ff0050);
      box-shadow: 0 12px 30px rgba(255,0,80,.28);
    }

    #msg {
      position: relative;
      z-index: 1;
      min-height: 50px;
      margin-top: 14px;
      padding: 12px;
      border-radius: 16px;
      line-height: 1.5;
      background: rgba(0, 0, 0, .25);
    }

    .progress-wrap {
      position: relative;
      z-index: 1;
      margin-top: 16px;
      height: 10px;
      border-radius: 99px;
      overflow: hidden;
      background: rgba(255, 255, 255, .15);
    }

    #progress {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, #00f5ff, #ff0050, #ffef5a);
      transition: width .25s ease;
    }

    .module-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .module-item {
      padding: 10px;
      border-radius: 16px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.12);
      color: #e8e8ff;
      font-size: 13px;
      line-height: 1.4;
    }

    .shake { animation: shake .28s ease; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .right-flash { animation: rightFlash .45s ease; }
    @keyframes rightFlash {
      0%, 100% { box-shadow: 0 24px 70px rgba(0,0,0,.42); }
      50% { box-shadow: 0 0 36px rgba(0,255,150,.95); }
    }

    .wrong-flash { animation: wrongFlash .45s ease; }
    @keyframes wrongFlash {
      0%, 100% { box-shadow: 0 24px 70px rgba(0,0,0,.42); }
      50% { box-shadow: 0 0 36px rgba(255,0,80,.95); }
    }

    .end-box {
      position: relative;
      z-index: 1;
      padding: 26px 12px 8px;
    }

    .end-box h2 {
      font-size: 32px;
      margin: 0 0 12px;
    }

    .end-box p {
      line-height: 1.8;
      color: #e8e8ff;
    }

    .victory-title {
      font-size: 38px;
      margin-bottom: 6px;
      text-shadow: 0 0 20px rgba(255,239,90,.8), 3px 3px 0 #ff0050, -3px -3px 0 #00f5ff;
    }

    .trophy {
      font-size: 72px;
      animation: trophy 1.2s ease-in-out infinite alternate;
    }

    @keyframes trophy {
      from { transform: translateY(0) rotate(-4deg); }
      to { transform: translateY(-8px) rotate(4deg); }
    }

    .result-list {
      text-align: left;
      margin: 16px 0 0;
      padding: 0;
      list-style: none;
    }

    .result-list li {
      margin: 8px 0;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(0,0,0,.22);
      color: #e8e8ff;
    }

    .gold { color: #ffef5a; font-weight: 900; }

    @media (max-width: 420px) {
      h1 { font-size: 27px; }
      #question { font-size: 22px; }
      .module-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

        </div>
        <button class="start-btn" onclick="startGame()">开始挑战</button>
      </section>

      <section id="playPanel" class="hidden">
        <div class="top-row">
          <div class="badge" id="level">第 1 / 100 题</div>
          <div class="score-box">得分：<span id="score">0</span></div>
        </div>

        <div class="module-line" id="moduleLine">当前模块</div>

        <div class="question-area" id="questionArea">
          <p id="type"></p>
          <p id="question"></p>
        </div>

        <input id="answer" placeholder="请输入答案，按回车也可以提交" autocomplete="off" />

        <div class="btn-row">
          <button class="skip" id="skipBtn" onclick="skipQuestion()">跳过</button>
          <button class="submit" id="submitBtn" onclick="check()">提交</button>
        </div>

        <p id="msg">准备开始，答对一题 +2 分。</p>

        <div class="progress-wrap">
          <div id="progress"></div>
        </div>
      </section>

      <section id="victoryPanel" class="hidden end-box">
        <div class="trophy">🏆</div>
        <h2 class="victory-title">挑战完成！</h2>
        <p id="finalText"></p>
        <ul class="result-list" id="resultList"></ul>
        <button class="restart" onclick="restartGame()">再来一局</button>
      </section>
    </div>
  </div>

      { t: "世界战役", q: "太平洋战争重要转折战役是？", a: ["中途岛战役", "中途岛"] },
      { t: "世界战役", q: "一战中有“绞肉机”之称的战役是？", a: ["凡尔登战役", "凡尔登"] },
      { t: "世界战役", q: "滑铁卢战役中失败的法国皇帝是？", a: ["拿破仑"] },
      { t: "世界战役", q: "二战德国法西斯头目是？", a: ["希特勒"] },
      { t: "世界战役", q: "二战太平洋战场著名美国将军是？", a: ["麦克阿瑟"] },
      { t: "世界战役", q: "古罗马著名统帅，名字常与“凯撒大帝”相关的是？", a: ["凯撒", "尤利乌斯凯撒"] },

      { t: "全球谐音城市", q: "🐔 + 🦢，猜一个城市", a: ["基辅", "kyiv", "kiev"] },
      { t: "全球谐音城市", q: "🍐 + 🍺，猜一个英国城市", a: ["利物浦", "liverpool"] },
      { t: "全球谐音城市", q: "🐴 + 🧱，猜一个欧洲首都", a: ["马德里", "madrid"] },
      { t: "全球谐音城市", q: "🗼 + 🐻，猜一个亚洲城市", a: ["东京", "tokyo"] },
      { t: "全球谐音城市", q: "🦁 + 🚪，猜一个中国城市", a: ["厦门", "xiamen"] },
      { t: "全球谐音城市", q: "🍞 + 🧊，猜一个澳洲城市", a: ["墨尔本", "melbourne"] },
      { t: "全球谐音城市", q: "🐑 + 🔔，猜一个欧洲首都", a: ["柏林", "berlin"] },
      { t: "全球谐音城市", q: "🧂 + 🐟，猜一个亚洲首都", a: ["首尔", "seoul"] },
      { t: "全球谐音城市", q: "🍐 + 🧱，猜一个欧洲首都", a: ["里斯本", "lisbon"] },
      { t: "全球谐音城市", q: "🐮 + 津，猜一个英国城市", a: ["牛津", "oxford"] }
    ];

    let i = 0;
    let score = 0;
    let rightCount = 0;
    let wrongCount = 0;
    let skipCount = 0;
    let locked = false;

    const startPanel = document.getElementById("startPanel");
    const playPanel = document.getElementById("playPanel");
    const victoryPanel = document.getElementById("victoryPanel");
    const typeEl = document.getElementById("type");
    const questionEl = document.getElementById("question");
    const questionAreaEl = document.getElementById("questionArea");
    const answerEl = document.getElementById("answer");
    const msgEl = document.getElementById("msg");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const progressEl = document.getElementById("progress");
    const cardEl = document.getElementById("card");
    const submitBtn = document.getElementById("submitBtn");
    const skipBtn = document.getElementById("skipBtn");
    const moduleLine = document.getElementById("moduleLine");
    const finalText = document.getElementById("finalText");
    const resultList = document.getElementById("resultList");

    function normalize(str) {
      return String(str)
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[，。,.!！?？《》<>“”"'：:；;、\-]/g, "");
    }

    function startGame() {
      startPanel.classList.add("hidden");
      playPanel.classList.remove("hidden");
      load();
    }

    function getModuleName(index) {
      const n = Math.floor(index / 10) + 1;
      const names = [
        "脑筋急转弯",
        "中国城市",
        "古代人物",
        "现代人物",
        "看图猜成语",
        "经典诗句补词",
        "四大名著猜人物",
        "四大名著经典地点",
        "世界战役",
        "全球谐音城市"
      ];
      return "第 " + n + " 板块：" + names[n - 1] + "（" + ((index % 10) + 1) + "/10）";
    }

    function load() {
      locked = false;
      submitBtn.disabled = false;
      skipBtn.disabled = false;

      const item = qs[i];
      typeEl.innerText = item.t;
      questionEl.innerText = item.q;
      answerEl.value = "";
      msgEl.innerText = "请输入答案，答对 +2 分。";
      levelEl.innerText = "第 " + (i + 1) + " / " + qs.length + " 题";
      moduleLine.innerText = getModuleName(i);
      progressEl.style.width = (i / qs.length * 100) + "%";

      questionAreaEl.style.animation = "none";
      setTimeout(() => questionAreaEl.style.animation = "pop .28s ease", 20);
      answerEl.focus();
    }

    function check() {
      if (locked) return;
      const value = normalize(answerEl.value);

      if (!value) {
        msgEl.innerText = "请先输入答案。";
        shake();
        return;
      }

      locked = true;
      submitBtn.disabled = true;
      skipBtn.disabled = true;

      const item = qs[i];
      const ok = item.a.some(ans => normalize(ans) === value);

      if (ok) {
        score += 2;
        rightCount++;
        scoreEl.innerText = score;
        msgEl.innerHTML = "✅ 答对了！+2 分";
        cardEl.classList.add("right-flash");
        setTimeout(() => cardEl.classList.remove("right-flash"), 450);
      } else {
        wrongCount++;
        msgEl.innerHTML = "❌ 答错了，正确答案：<b>" + item.a[0] + "</b>";
        cardEl.classList.add("wrong-flash");
        shake();
        setTimeout(() => cardEl.classList.remove("wrong-flash"), 450);
      }

      setTimeout(nextQuestion, 900);
    }

    function skipQuestion() {
      if (locked) return;
      locked = true;
      submitBtn.disabled = true;
      skipBtn.disabled = true;
      skipCount++;
      const item = qs[i];
      msgEl.innerHTML = "⏭ 已跳过，答案：<b>" + item.a[0] + "</b>";
      setTimeout(nextQuestion, 850);
    }

    function nextQuestion() {
      i++;
      if (i >= qs.length) {
        finish();
      } else {
        load();
      }
    }

    function shake() {
      cardEl.classList.add("shake");
      setTimeout(() => cardEl.classList.remove("shake"), 300);
    }

    function getLevel(score) {
      if (score < 60) return { name: "青铜新手", desc: "先别慌，至少你已经见过世面了。" };
      if (score < 100) return { name: "白银选手", desc: "基础不错，脑回路正在发光。" };
      if (score < 140) return { name: "黄金高手", desc: "你已经能靠知识点和谐音梗横着走了。" };
      if (score < 180) return { name: "钻石大师", desc: "离王者只差一点点，实力很稳。" };
      return { name: "王者段位", desc: "太强了，100题都被你打穿了。" };
    }

    function finish() {
      progressEl.style.width = "100%";
      playPanel.classList.add("hidden");
      victoryPanel.classList.remove("hidden");

      const level = getLevel(score);
      finalText.innerHTML = `
        你的最终得分：<span class="gold" style="font-size:30px;">${score}</span> / 200<br>
        评级：<span class="gold">${level.name}</span><br>
        ${level.desc}
      `;

      resultList.innerHTML = `
        <li>✅ 答对：<span class="gold">${rightCount}</span> 题</li>
        <li>❌ 答错：<span class="gold">${wrongCount}</span> 题</li>
        <li>⏭ 跳过：<span class="gold">${skipCount}</span> 题</li>
        <li>📚 完成模块：<span class="gold">10 / 10</span></li>
        <li>🎉 状态：<span class="gold">全部完成，胜利通关！</span></li>
      `;
    }

    function restartGame() {
      i = 0;
      score = 0;
      rightCount = 0;
      wrongCount = 0;
      skipCount = 0;
      locked = false;
      scoreEl.innerText = score;
      victoryPanel.classList.add("hidden");
      startPanel.classList.remove("hidden");
      progressEl.style.width = "0%";
    }

    answerEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter") check();
    });
  </script>
</body>
</html>
